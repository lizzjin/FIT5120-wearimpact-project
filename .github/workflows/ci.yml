# Continuous integration for WearImpact.
#
# Triggered on pull requests against develop/main and on direct pushes to
# develop. Runs in GitHub-hosted runners that are isolated from any
# production deployment — failing this workflow never affects the live
# Vercel / Railway / HuggingFace services.
#
# All jobs intentionally avoid relying on real secrets:
#   - frontend-build         : Vite tolerates missing VITE_* vars at build time.
#   - backend-test           : conftest.py sets a placeholder DATABASE_URL;
#                              tests mock outbound HTTP and Anthropic / Google.
#   - backend-lint           : ruff is pure static analysis.

name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

jobs:
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Use npm install (not ci) — package-lock may not exist yet for
        # newly-added devDeps; fall back gracefully on first run.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
        env:
          # husky's prepare script is guarded with `|| true`, but disable
          # it explicitly in CI to avoid stderr noise.
          HUSKY: '0'

      - name: Build
        run: npm run build

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Ruff check
        # Don't fail the workflow on lint findings during the soft-launch
        # period — surface them in the job log so they can be cleaned up
        # incrementally. Flip `continue-on-error` to false once baseline is green.
        continue-on-error: true
        run: ruff check .
