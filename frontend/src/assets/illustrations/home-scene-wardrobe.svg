<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 480" fill="none">
  <!-- L1 §2 — Animated Cluttered Wardrobe (replaces the lone Pexels photo).
       15 garments distributed across hang-rod, shelves, floor pile.
       Three of them lime-glow on each question reveal; nearly all flash on the 84% stat.
       Loop motion: passive shadow shift on cabinet, subtle door creak. -->

  <!-- Cabinet outer frame -->
  <rect x="40" y="30" width="460" height="420" rx="14" fill="#163300" />
  <rect x="50" y="40" width="440" height="400" rx="10" fill="#e2f6d5" />

  <!-- Inner divider (vertical) — splits hang area from shelf area -->
  <line x1="320" y1="60" x2="320" y2="370" stroke="#163300" stroke-width="2" stroke-linecap="round" />

  <!-- Hang rod (left side) -->
  <line x1="64" y1="86" x2="306" y2="86" stroke="#163300" stroke-width="2.6" stroke-linecap="round" />
  <line x1="74" y1="86" x2="74" y2="74" stroke="#163300" stroke-width="2" stroke-linecap="round" />
  <line x1="296" y1="86" x2="296" y2="74" stroke="#163300" stroke-width="2" stroke-linecap="round" />

  <!-- Hanging garments on left side (5 items) -->
  <!-- Item 1 — wardrobe-item-1, glows on Q1 -->
  <g class="wardrobe-item wardrobe-item-1">
    <path d="M84 84 C 84 78 92 78 92 84" stroke="#163300" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M88 90 L88 96 L70 122 L106 122 L88 96 Z" fill="#9fe870" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
    <path d="M76 122 L72 168 L104 168 L100 122 Z" fill="#9fe870" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>
  <!-- Item 2 -->
  <g class="wardrobe-item wardrobe-item-2">
    <path d="M126 84 C 126 78 134 78 134 84" stroke="#163300" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M130 90 L130 96 L114 116 L146 116 L130 96 Z" fill="#ffc091" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
    <path d="M118 116 L114 158 L146 158 L142 116 Z" fill="#ffc091" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>
  <!-- Item 3 — wardrobe-item-3, glows on Q2 -->
  <g class="wardrobe-item wardrobe-item-3">
    <path d="M168 84 C 168 78 176 78 176 84" stroke="#163300" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M172 90 L172 96 L154 124 L190 124 L172 96 Z" fill="#cdffad" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
    <path d="M158 124 L154 174 L190 174 L186 124 Z" fill="#cdffad" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>
  <!-- Item 4 -->
  <g class="wardrobe-item wardrobe-item-4">
    <path d="M212 84 C 212 78 220 78 220 84" stroke="#163300" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M216 90 L216 96 L200 118 L232 118 L216 96 Z" fill="#163300" stroke-linejoin="round" />
    <path d="M204 118 L200 158 L232 158 L228 118 Z" fill="#163300" stroke-linejoin="round" />
  </g>
  <!-- Item 5 -->
  <g class="wardrobe-item wardrobe-item-5">
    <path d="M256 84 C 256 78 264 78 264 84" stroke="#163300" stroke-width="1.4" fill="none" stroke-linecap="round" />
    <path d="M260 90 L260 96 L244 120 L276 120 L260 96 Z" fill="#9fe870" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
    <path d="M248 120 L244 162 L276 162 L272 120 Z" fill="#9fe870" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>

  <!-- Shelf 1 (right side, top) — folded clothes -->
  <line x1="334" y1="120" x2="476" y2="120" stroke="#163300" stroke-width="2" stroke-linecap="round" />
  <g class="wardrobe-item wardrobe-item-6">
    <rect x="340" y="84" width="60" height="32" rx="4" fill="#9fe870" stroke="#163300" stroke-width="1.4" />
    <line x1="340" y1="100" x2="400" y2="100" stroke="#163300" stroke-width="1" />
  </g>
  <g class="wardrobe-item wardrobe-item-7">
    <rect x="408" y="86" width="60" height="30" rx="4" fill="#cdffad" stroke="#163300" stroke-width="1.4" />
    <line x1="408" y1="101" x2="468" y2="101" stroke="#163300" stroke-width="1" />
  </g>

  <!-- Shelf 2 — wardrobe-item-8, glows on Q3 -->
  <line x1="334" y1="180" x2="476" y2="180" stroke="#163300" stroke-width="2" stroke-linecap="round" />
  <g class="wardrobe-item wardrobe-item-8">
    <rect x="340" y="142" width="56" height="38" rx="4" fill="#ffc091" stroke="#163300" stroke-width="1.4" />
    <line x1="340" y1="160" x2="396" y2="160" stroke="#163300" stroke-width="1" />
  </g>
  <g class="wardrobe-item wardrobe-item-9">
    <rect x="404" y="146" width="64" height="34" rx="4" fill="#163300" />
    <line x1="404" y1="163" x2="468" y2="163" stroke="#9fe870" stroke-width="1" />
  </g>

  <!-- Shelf 3 — messier pile -->
  <line x1="334" y1="240" x2="476" y2="240" stroke="#163300" stroke-width="2" stroke-linecap="round" />
  <g class="wardrobe-item wardrobe-item-10">
    <rect x="340" y="200" width="50" height="40" rx="4" fill="#9fe870" stroke="#163300" stroke-width="1.4" transform="rotate(-3 365 220)" />
  </g>
  <g class="wardrobe-item wardrobe-item-11">
    <rect x="394" y="206" width="40" height="34" rx="4" fill="#cdffad" stroke="#163300" stroke-width="1.4" transform="rotate(4 414 223)" />
  </g>
  <g class="wardrobe-item wardrobe-item-12">
    <rect x="438" y="200" width="40" height="40" rx="4" fill="#ffc091" stroke="#163300" stroke-width="1.4" transform="rotate(-2 458 220)" />
  </g>

  <!-- Shelf 4 — drawer hint -->
  <rect x="334" y="260" width="142" height="100" rx="4" fill="#cdffad" opacity="0.5" stroke="#163300" stroke-width="1.4" />
  <line x1="394" y1="306" x2="416" y2="306" stroke="#163300" stroke-width="2" stroke-linecap="round" />

  <!-- Floor pile under cabinet (overflow) — 3 garments on the ground -->
  <g class="wardrobe-item wardrobe-item-13">
    <path d="M64 380 L116 372 L132 408 L70 414 Z" fill="#9fe870" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>
  <g class="wardrobe-item wardrobe-item-14">
    <path d="M120 388 L186 380 L196 416 L128 422 Z" fill="#ffc091" stroke="#163300" stroke-width="1.4" stroke-linejoin="round" />
  </g>
  <g class="wardrobe-item wardrobe-item-15">
    <path d="M188 384 L256 376 L268 414 L196 420 Z" fill="#163300" stroke-linejoin="round" />
  </g>

  <!-- Floor line outside cabinet -->
  <line x1="20" y1="450" x2="520" y2="450" stroke="#163300" stroke-width="2" stroke-linecap="round" />

  <!-- Subtle door creak / sway shadow group -->
  <g class="wardrobe-shadow" opacity="0.18">
    <rect x="50" y="40" width="14" height="400" fill="#163300" />
  </g>
</svg>
