<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- L1 §3 motif — tangling fiber strands.
       Three sinuous paths, each animating stroke-dashoffset on a 5s loop, phase-shifted. -->
  <g stroke-width="3" stroke-linecap="round" fill="none">
    <path
      class="fiber-strand fiber-strand-1"
      d="M30 60 C 80 40 130 90 180 70 C 220 56 232 86 224 120"
      stroke="#9fe870"
      stroke-dasharray="240"
    />
    <path
      class="fiber-strand fiber-strand-2"
      d="M30 120 C 80 100 130 150 180 130 C 220 116 232 146 224 180"
      stroke="#cdffad"
      stroke-dasharray="240"
    />
    <path
      class="fiber-strand fiber-strand-3"
      d="M30 180 C 80 160 130 210 180 190"
      stroke="#163300"
      stroke-dasharray="240"
    />
    <!-- Cross-fibers, slowly drifting opacity -->
    <g class="fiber-cross">
      <line x1="60" y1="20" x2="70" y2="220" stroke="#163300" stroke-width="1.2" stroke-dasharray="4 6" />
      <line x1="120" y1="20" x2="130" y2="220" stroke="#163300" stroke-width="1.2" stroke-dasharray="4 6" />
      <line x1="180" y1="20" x2="190" y2="220" stroke="#163300" stroke-width="1.2" stroke-dasharray="4 6" />
    </g>
  </g>
</svg>
