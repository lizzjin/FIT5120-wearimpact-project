<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 380" fill="none">
  <!-- L1 §6 — Mini brand card being scored.
       Bars fill 0 → target; score badge appears; magnifier sweeps across.
       Loop ~5s, then resets. -->

  <!-- Card body -->
  <rect x="60" y="40" width="360" height="300" rx="30" fill="#ffffff" stroke="#163300" stroke-width="2" />

  <!-- Brand identity row -->
  <circle cx="110" cy="100" r="22" fill="#e2f6d5" stroke="#163300" stroke-width="1.6" />
  <text x="110" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#163300">B</text>
  <rect x="146" y="86" width="120" height="10" rx="5" fill="#163300" opacity="0.85" />
  <rect x="146" y="106" width="80" height="6" rx="3" fill="#163300" opacity="0.4" />

  <!-- Score badge — pulses through label colors -->
  <g class="brand-badge">
    <circle cx="370" cy="100" r="34" fill="#e2f6d5" stroke="#163300" stroke-width="2" />
    <text class="brand-score-num" x="370" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#054d28">78</text>
    <text x="370" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-size="9" font-weight="700" fill="#054d28">GREAT</text>
  </g>

  <!-- Three mini-bars filling -->
  <!-- Bar 1 -->
  <text x="84" y="174" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#163300">Governance</text>
  <rect x="84" y="184" width="312" height="8" rx="4" fill="#e8ebe6" />
  <rect class="brand-bar brand-bar-1" x="84" y="184" width="240" height="8" rx="4" fill="#9fe870" />

  <!-- Bar 2 -->
  <text x="84" y="218" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#163300">Tracing</text>
  <rect x="84" y="228" width="312" height="8" rx="4" fill="#e8ebe6" />
  <rect class="brand-bar brand-bar-2" x="84" y="228" width="160" height="8" rx="4" fill="#cdffad" />

  <!-- Bar 3 -->
  <text x="84" y="262" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#163300">Environment</text>
  <rect x="84" y="272" width="312" height="8" rx="4" fill="#e8ebe6" />
  <rect class="brand-bar brand-bar-3" x="84" y="272" width="200" height="8" rx="4" fill="#9fe870" />

  <!-- CTA bar -->
  <rect x="84" y="304" width="180" height="20" rx="10" fill="#163300" />
  <text x="174" y="318" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#9fe870">VIEW PROFILE →</text>

  <!-- Magnifier sweep — translates left-to-right -->
  <g class="brand-magnifier">
    <circle cx="0" cy="200" r="28" fill="none" stroke="#163300" stroke-width="2.4" />
    <line x1="20" y1="220" x2="38" y2="238" stroke="#163300" stroke-width="3" stroke-linecap="round" />
    <circle cx="0" cy="200" r="22" fill="#9fe870" opacity="0.18" />
  </g>
</svg>
