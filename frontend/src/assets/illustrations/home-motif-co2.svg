<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- L1 §3 motif — drifting CO₂ cloud.
       Cloud body drifts ±4px Y on 6s loop. Wisps below opacity-cycle on 4s. -->

  <!-- Smokestack base (static reference) -->
  <rect x="105" y="180" width="30" height="40" fill="#163300" rx="2" />
  <line x1="100" y1="180" x2="140" y2="180" stroke="#163300" stroke-width="3" stroke-linecap="round" />

  <!-- Cloud puff group -->
  <g class="co2-cloud">
    <ellipse cx="80" cy="100" rx="28" ry="22" fill="#cdffad" stroke="#163300" stroke-width="2" />
    <ellipse cx="120" cy="84" rx="36" ry="28" fill="#9fe870" stroke="#163300" stroke-width="2" />
    <ellipse cx="160" cy="100" rx="28" ry="22" fill="#cdffad" stroke="#163300" stroke-width="2" />
    <text x="120" y="98" text-anchor="middle" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#163300">CO₂</text>
  </g>

  <!-- Wisp 1 -->
  <path
    class="co2-wisp co2-wisp-1"
    d="M70 150 C 80 144 90 154 100 148"
    stroke="#163300"
    stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="3 4"
    fill="none"
  />
  <!-- Wisp 2 -->
  <path
    class="co2-wisp co2-wisp-2"
    d="M130 156 C 140 150 150 160 160 154"
    stroke="#163300"
    stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="3 4"
    fill="none"
  />
  <!-- Wisp 3 -->
  <path
    class="co2-wisp co2-wisp-3"
    d="M100 168 C 110 162 120 172 130 166"
    stroke="#ffc091"
    stroke-width="2"
    stroke-linecap="round"
    stroke-dasharray="3 4"
    fill="none"
  />
</svg>
