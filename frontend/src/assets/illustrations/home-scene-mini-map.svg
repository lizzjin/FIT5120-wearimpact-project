<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 360" fill="none">
  <!-- L1 §5 — Mini map preview.
       Pins drop sequentially; dashed path's stroke-dashoffset flows; user-pulse breathes. -->

  <!-- Map background -->
  <rect x="20" y="20" width="440" height="320" rx="20" fill="#e2f6d5" />

  <!-- Faint street grid -->
  <g stroke="#163300" stroke-width="1" opacity="0.18">
    <line x1="20" y1="80" x2="460" y2="80" />
    <line x1="20" y1="140" x2="460" y2="140" />
    <line x1="20" y1="200" x2="460" y2="200" />
    <line x1="20" y1="260" x2="460" y2="260" />
    <line x1="100" y1="20" x2="100" y2="340" />
    <line x1="200" y1="20" x2="200" y2="340" />
    <line x1="300" y1="20" x2="300" y2="340" />
    <line x1="400" y1="20" x2="400" y2="340" />
  </g>

  <!-- Diagonal street emphasis -->
  <path
    d="M40 320 L120 220 L240 240 L320 140 L440 100"
    stroke="#163300"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
    opacity="0.28"
  />

  <!-- Dashed path from user to first pin (animated stroke flow) -->
  <path
    class="map-path"
    d="M240 200 C 280 180 300 140 320 110"
    stroke="#9fe870"
    stroke-width="2.6"
    stroke-linecap="round"
    stroke-dasharray="6 8"
    fill="none"
  />

  <!-- User location dot — pulse breathing -->
  <g class="map-user">
    <circle cx="240" cy="200" r="20" fill="#9fe870" opacity="0.25" />
    <circle cx="240" cy="200" r="10" fill="#9fe870" stroke="#163300" stroke-width="2" />
    <circle cx="240" cy="200" r="3" fill="#163300" />
  </g>

  <!-- Pin 1 — top-right -->
  <g class="map-pin map-pin-1" style="transform-origin: 320px 110px;">
    <path
      d="M320 78 C 308 78 300 86 300 98 C 300 112 320 130 320 130 C 320 130 340 112 340 98 C 340 86 332 78 320 78 Z"
      fill="#9fe870"
      stroke="#163300"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <circle cx="320" cy="96" r="5" fill="#163300" />
  </g>

  <!-- Pin 2 — middle-left -->
  <g class="map-pin map-pin-2" style="transform-origin: 140px 200px;">
    <path
      d="M140 168 C 128 168 120 176 120 188 C 120 202 140 220 140 220 C 140 220 160 202 160 188 C 160 176 152 168 140 168 Z"
      fill="#9fe870"
      stroke="#163300"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <circle cx="140" cy="186" r="5" fill="#163300" />
  </g>

  <!-- Pin 3 — bottom-right -->
  <g class="map-pin map-pin-3" style="transform-origin: 380px 270px;">
    <path
      d="M380 238 C 368 238 360 246 360 258 C 360 272 380 290 380 290 C 380 290 400 272 400 258 C 400 246 392 238 380 238 Z"
      fill="#9fe870"
      stroke="#163300"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <circle cx="380" cy="256" r="5" fill="#163300" />
  </g>
</svg>
